<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Django Docker App</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color:white;
        }

        .container{
            text-align:center;
            padding:40px;
            border-radius:15px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            width: 500px;
        }

        h1{
            font-size:40px;
            margin-bottom:20px;
            color:#38bdf8;
        }

        p{
            font-size:18px;
            margin-bottom:15px;
            line-height:1.6;
        }

        .badge{
            display:inline-block;
            padding:10px 20px;
            background:#22c55e;
            border-radius:30px;
            margin-top:15px;
            font-weight:bold;
        }

        footer{
            margin-top:25px;
            font-size:14px;
            color:#cbd5e1;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1> My Django App Running in Docker</h1>

        <p>
            Welcome to my Django application successfully
            containerized using Docker.
        </p>

        <p>
            This project is part of my DevOps learning journey.
        </p>

        <div class="badge">
            My Docker + Django App Connected Successfully
        </div>

        <footer>
            Built by Swetha using Django & Docker
        </footer>

    </div>

</body>
</html>
